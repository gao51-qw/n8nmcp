# /etc/nginx/sites-available/n8nworkflow.conf
# After copying:
#   ln -s /etc/nginx/sites-available/n8nworkflow.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d app.n8nworkflow.com -d mcp.n8nworkflow.com

# ---------- Main app ----------
server {
    listen 80;
    listen [::]:80;
    server_name app.n8nworkflow.com;
    # certbot will inject TLS block here on first run.

    # Allow large uploads (xlsx etc.)
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # SSE / streaming friendly
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ---------- MCP knowledge server ----------
server {
    listen 80;
    listen [::]:80;
    server_name mcp.n8nworkflow.com;

    client_max_body_size 10m;

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:3000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP needs SSE-style flushing
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        return 404;
    }
}
