# /etc/nginx/sites-available/n8nworkflow.conf
# After copying:
#   ln -s /etc/nginx/sites-available/n8nworkflow.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d app.n8nworkflow.com -d mcp.n8nworkflow.com

# ─── Shared security headers (applied via include in each server block) ───
# HSTS only enabled on 443 (added by certbot block automatically). The headers
# below are safe on plain HTTP too.
map $sent_http_content_type $security_headers_xcto { default "nosniff"; }

# ---------- Main app ----------
server {
    listen 80;
    listen [::]:80;
    server_name app.n8nworkflow.com;
    # certbot will inject TLS block here on first run.

    client_max_body_size 25m;

    # ─── Security response headers ───
    # HSTS: 1 year, include subdomains. Only meaningful over HTTPS — harmless on
    # the redirect-only :80 block since browsers ignore it there.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Cross-origin isolation for SSE/streaming endpoints
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ─── Stripe webhook MUST be raw body — disable any buffering/transformation ───
    location = /api/public/stripe-webhook {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # SSE / streaming friendly
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ---------- MCP knowledge server ----------
# NOTE: This vhost exposes the *upstream* knowledge container only. End users
# should call the per-user gateway at https://app.n8nworkflow.com/api/public/mcp
# (Bearer nmcp_<platform-api-key>). This vhost is optional — keep it private
# (e.g. behind a firewall) or remove it if you don't need direct access.
server {
    listen 80;
    listen [::]:80;
    server_name mcp.n8nworkflow.com;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:3000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
