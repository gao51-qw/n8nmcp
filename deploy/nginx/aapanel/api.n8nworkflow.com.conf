server {
    listen 80;
    server_name api.n8nworkflow.com;
    root /www/wwwroot/api.n8nworkflow.com;

    location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }

    access_log /www/wwwlogs/api.n8nworkflow.com.log;
    error_log /www/wwwlogs/api.n8nworkflow.com.error.log;
}

server {
    listen 443 ssl http2;
    server_name api.n8nworkflow.com;
    ssl_certificate /etc/letsencrypt/live/n8nmcp-api/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8nmcp-api/privkey.pem;

    location ~ ^/(auth|rest|storage|realtime|functions)/v1(?:/|$) {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / { return 404; }

    access_log /www/wwwlogs/api.n8nworkflow.com.log;
    error_log /www/wwwlogs/api.n8nworkflow.com.error.log;
}
