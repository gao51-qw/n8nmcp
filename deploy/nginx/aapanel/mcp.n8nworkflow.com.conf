server {
    listen 80;
    server_name mcp.n8nworkflow.com;
    root /www/wwwroot/mcp.n8nworkflow.com;

    location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }

    access_log /www/wwwlogs/mcp.n8nworkflow.com.log;
    error_log /www/wwwlogs/mcp.n8nworkflow.com.error.log;
}

server {
    listen 443 ssl http2;
    server_name mcp.n8nworkflow.com;
    ssl_certificate /etc/letsencrypt/live/n8nmcp-frontends/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8nmcp-frontends/privkey.pem;

    include /www/server/panel/vhost/nginx/n8nmcp-app-proxy.inc;

    access_log /www/wwwlogs/mcp.n8nworkflow.com.log;
    error_log /www/wwwlogs/mcp.n8nworkflow.com.error.log;
}
