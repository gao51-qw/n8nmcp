# Wildcard reverse-proxy for per-PR preview environments.
#
# Install:
#   sudo cp deploy/nginx/preview.conf /etc/nginx/sites-available/preview.conf
#   sudo ln -sf /etc/nginx/sites-available/preview.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Wildcard TLS certificate (DNS-01 challenge required for wildcard):
#   sudo certbot certonly --manual --preferred-challenges=dns \
#        -d '*.preview.n8nworkflow.com' -d preview.n8nworkflow.com
#
# DNS:
#   *.preview.n8nworkflow.com  A  <VPS_IP>
#
# Each PR container listens on 127.0.0.1:$((40000 + PR)). The map below
# extracts the PR number from the subdomain and computes the upstream port.

# Extract "<N>" from "pr-<N>.preview.n8nworkflow.com" → $pr_number, else empty.
map $host $pr_number {
    default                                                    "";
    "~^pr-(?<n>[0-9]{1,5})\.preview\.n8nworkflow\.com$"        $n;
}

# nginx has no arithmetic, so we left-pad the PR number and prepend "4" to
# get the per-PR upstream port (40000..49999).
#   PR 7   → 40007
#   PR 42  → 40042
#   PR 137 → 40137
#   PR 1234→ 41234
map $pr_number $preview_upstream_port {
    default                              "0";
    "~^(?<n>[0-9]{1})$"                  "4000$n";
    "~^(?<n>[0-9]{2})$"                  "400$n";
    "~^(?<n>[0-9]{3})$"                  "40$n";
    "~^(?<n>[0-9]{4})$"                  "4$n";
}

map $http_upgrade $http_connection {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name *.preview.n8nworkflow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.preview.n8nworkflow.com;

    ssl_certificate     /etc/letsencrypt/live/preview.n8nworkflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preview.n8nworkflow.com/privkey.pem;

    # Visible "preview" banner header for tooling/robots.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Preview-PR $pr_number always;

    client_max_body_size 25m;

    # Reject unknown subdomains (e.g. someone hits foo.preview.…) with 404.
    if ($pr_number = "") {
        return 404 "preview not found\n";
    }

    location / {
        proxy_pass http://127.0.0.1:$preview_upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;

        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}