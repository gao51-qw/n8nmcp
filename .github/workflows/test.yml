name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest (i18n + docs head)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache vitest
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vitest
            node_modules/.vite
          key: ${{ runner.os }}-vitest-${{ hashFiles('vitest.config.ts', 'vite.config.ts', 'bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-vitest-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test

      - name: Run docs head i18n integrity tests
        run: |
          bunx vitest run src/i18n/__tests__/docs-head.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/docs-head-junit.xml \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=html \
            --coverage.reporter=lcov \
            --coverage.reportsDirectory=coverage/docs-head \
            --coverage.include='src/i18n/docs-dict.ts' \
            --coverage.include='src/i18n/locales/docs/**' \
            --coverage.include='src/lib/seo-jsonld.ts'

      - name: Upload docs-head test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-head-test-report
          path: |
            reports/docs-head-junit.xml
            coverage/docs-head
          if-no-files-found: warn
          retention-days: 14