name: build-and-publish

on:
  schedule:
    - cron: "0 2 * * 1"   # Monday 02:00 UTC — refresh knowledge base weekly
  push:
    branches: [main]
    paths:
      - "tools/n8n-knowledge-mcp/**"
      - ".github/workflows/n8n-knowledge-mcp.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/n8n-knowledge-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: tag
        run: echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: tools/n8n-knowledge-mcp
          file: tools/n8n-knowledge-mcp/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/n8n-knowledge-mcp:latest
            ghcr.io/${{ github.repository_owner }}/n8n-knowledge-mcp:${{ steps.tag.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
